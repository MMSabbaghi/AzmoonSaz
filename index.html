<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ساخت کوییز</title>
  <link href="./utils/cropper/cropper.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./icons/bootstrap-icons.min.css">
  <script src="./utils/3.4.17"></script>
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100 md:p-6">

  <div class="max-w-6xl mx-auto bg-white p-3 md:p-6 rounded shadow app-container" id="app-container">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">کوئیز ساز</h1>
      <div>
        <button id="exportJson" class="btn px-4 py-2">
          <i class="bi bi-floppy"></i>
          ذخیره آزمون
        </button>
        <input type="file" id="importJson" class="hidden">
        <label for="importJson" class="btn px-4 py-2">
          <i class="bi bi-folder-plus"></i>
          <span> ورود اطلاعات</span>
        </label>
      </div>
    </div>

    <div id="ranges" class="flex flex-col gap-2"></div>

    <button id="addRange" style="width: 100%;" class="btn add-btn my-2">
      <i class="bi bi-plus-lg"></i>
      <span>افزودن مبحث جدید</span>
    </button>

    <div id="sentinel"></div>
    <div class="my-1 bg-white export-btns sticky-box" id="sticky">
      <div class="flex items-center justify-between gap-1">
        <!-- بخش سمت چپ (اسامی) که در موبایل پنهان می‌شود -->
        <div class="flex items-center gap-2 names-section-original">
          <div>
            <label> تعداد دانش آموزان: </label>
            <input value="1" data-number-input="true" data-float="false" type="text" id="names-count"
              class="border rounded p-2 w-20" placeholder="تعداد ">
          </div>
          <div class="flex items-center gap-2">
            <label for="fontSelector">فونت:</label>
            <select id="fontSelector" class="border rounded p-2 text-sm bg-white text-gray-800">
              <option value="'Vazirmatn', sans-serif" style="font-family: 'Vazirmatn', sans-serif;">وزیرمتن</option>
              <option value="'Shabnam', sans-serif" style="font-family: 'Shabnam', sans-serif;">شبنم</option>
              <option value="'BNazanin', sans-serif" style="font-family:'BNazanin', sans-serif;">نازنین</option>
            </select>
          </div>
          <div id="names-switch" class="flex gap-1">
            <label> نمایش اسامی: </label>
            <div id="switch" class="relative w-[42px] h-[24px] bg-[#ccc] rounded-[var(--radius)] cursor-pointer
                transition-all duration-300 ease-out shadow-inner">
              <div id="knob" class="absolute top-[2px] left-[3px] w-[20px] h-[20px] bg-white rounded-[var(--radius)]
                  transition-all duration-500 shadow-md">
              </div>
            </div>
          </div>
        </div>
        <div>
          <button id="generate" class="btn px-4 py-2 rounded mt-2 md:mb-2 desktop-cta">
            <i class="bi bi-clipboard2-check"></i>
            <span>تولید آزمون</span>
          </button>
          <button onclick="window.print()" class="btn px-4 py-2 rounded md:mt-2 mb-2 desktop-cta">
            <i class="bi bi-printer"></i>
            <span>چاپ خروجی</span>
          </button>
        </div>
      </div>
      <!-- تکست‌اریا اساسی -->
      <div id="names-textarea"
        class="overflow-hidden max-h-0 opacity-0 blur-sm -translate-y-3 transition-all duration-500 ease-out">
        <textarea rows="5" class="w-full h-15 border rounded-[var(--radius)] p-3 text-sm focus:outline-none"
          placeholder="نام دانش‌آموزان هر کدام در یک خط"></textarea>
      </div>
    </div>

    <!-- نوار پایین موبایل -->
    <div id="mobile-bottom-bar">
      <div class="names-controls"></div> <!-- place for cloned names section -->
      <div class="mobile-actions">
        <button class="btn mobile-generate"><i class="bi bi-clipboard2-check"></i> تولید آزمون</button>
        <button class="btn mobile-print"><i class="bi bi-printer"></i> چاپ</button>
      </div>
    </div>

    <div id="printable" class="overflow-auto">
      <div class="flex items-center justify-center">
        <img src="images/no_data.jpg" alt="no_data" style="max-height: 380px;">
      </div>
    </div>
  </div>

  <!-- مودال ویرایش آیتم (با ادیتورهای جدید) -->
  <div id="modal" class="modal" style="display: none;">
    <div id="modal-overlay" class="absolute inset-0 bg-black/60"></div>
    <div id="modalContent" class="flex flex-col z-10 w-[72rem] p-6 bg-white rounded-lg" style="transition: transform 0.3s ease-out;">
      
      <!-- ========== ویرایشگر متن جدید (بدون interact.js) ========== -->
      <div class="editor-container mb-4">
        <div class="toolbar" id="mainToolbar">
          <button class="tool-btn" id="alignLeft" title="چپ‌چین"><i class="bi bi-text-left"></i></button>
          <button class="tool-btn" id="alignCenter" title="وسط‌چین"><i class="bi bi-text-center"></i></button>
          <button class="tool-btn" id="alignRight" title="راست‌چین"><i class="bi bi-text-right"></i></button>
          <button class="tool-btn" id="alignJustify" title="هم‌تراز"><i class="bi bi-justify"></i></button>

          <input type="color" id="textColor" class="tool-btn" value="#1e293b" title="رنگ متن">
          <select id="fontSize" class="tool-btn" title="سایز قلم">
            <option value="3">معمولی</option>
            <option value="4">متوسط</option>
            <option value="5">بزرگ</option>
            <option value="6">بسیار بزرگ</option>
          </select>

          <select id="fontFamily" class="tool-btn" title="نوع قلم">
            <option value="Arial, sans-serif">Arial</option>
            <option value="'Times New Roman', serif">Times</option>
            <option value="'Courier New', monospace">Courier</option>
            <option value="'Georgia', serif">Georgia</option>
            <option value="'Vazir', system-ui">Vazir</option>
          </select>

          <button class="tool-btn" id="undoBtn" title="واگرد"><i class="bi bi-arrow-counterclockwise"></i></button>
          <button class="tool-btn" id="redoBtn" title="پیش‌گرد"><i class="bi bi-arrow-clockwise"></i></button>

          <!-- دکمه آپلود عکس (افزودن تصویر به متن) -->
          <button class="tool-btn" id="uploadImage" title="افزودن عکس"><i class="bi bi-image"></i></button>
          <input type="file" id="imageUploadInput" accept="image/*" style="display: none;">
        </div>

        <!-- باکس ویرایش متن -->
        <div id="editor" class="editor-box" contenteditable="true" data-placeholder="متن خود را بنویسید یا عکس اضافه کنید..."></div>

        <!-- نوار ابزار شناور تصویر (درون متن) - با اسلایدر ارتفاع اضافه شده -->
        <div id="imageToolbar" class="image-floatbar hidden">
          <div class="img-ctrl">
            <label>ارتفاع</label>
            <input type="range" id="imgHeightRange" min="20" max="800" value="300" class="w-16">
            <span id="imgHeightValue" class="text-xs">300px</span>
          </div>
          <div class="img-ctrl">
            <label>روشنایی</label>
            <input type="range" id="imgBrightness" min="0" max="200" value="100" class="w-16">
          </div>
          <div class="img-ctrl">
            <label>کنتراست</label>
            <input type="range" id="imgContrast" min="0" max="200" value="100" class="w-16">
          </div>
          <button class="tool-btn" id="floatLeft" style="background:#3b82f6; color:white;"><i class="bi bi-arrow-left-square"></i> چپ</button>
          <button class="tool-btn" id="floatCenter" style="background:#3b82f6; color:white;"><i class="bi bi-arrows-expand"></i> وسط</button>
          <button class="tool-btn" id="floatRight" style="background:#3b82f6; color:white;"><i class="bi bi-arrow-right-square"></i> راست</button>
          <button class="tool-btn" id="cropBtn" style="background:#ef4444; color:white;"><i class="bi bi-crop"></i> کراپ</button>
        </div>
      </div>

      <!-- ========== ویرایشگر تصویر جدید (برگرفته از image.txt) ========== -->
      <div id="imageEditorComponent" class="w-full bg-white rounded-xl border border-gray-200 p-3 mb-4">
        <div class="flex items-center justify-between mb-2">
          <span class="font-medium">تنظیمات تصویر</span>
          <label for="componentImageUpload" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm cursor-pointer">
            <i class="bi bi-cloud-upload"></i> انتخاب تصویر
          </label>
          <input type="file" id="componentImageUpload" accept="image/*" class="hidden">
        </div>
        <div id="componentImageBox" class="min-h-[100px] bg-gray-50 rounded-lg p-2 flex flex-wrap gap-2"></div>
        <div id="componentImageToolbar" class="hidden mt-3 flex flex-wrap items-center gap-2 p-2 bg-gray-100 rounded-lg">
          <button class="align-btn bg-blue-600 text-white p-1 rounded w-8 h-8" data-align="left"><i class="bi bi-text-left"></i></button>
          <button class="align-btn bg-blue-600 text-white p-1 rounded w-8 h-8" data-align="center"><i class="bi bi-text-center"></i></button>
          <button class="align-btn bg-blue-600 text-white p-1 rounded w-8 h-8" data-align="right"><i class="bi bi-text-right"></i></button>
          <div class="flex items-center gap-1">
            <i class="bi bi-arrows-vertical"></i>
            <input type="range" id="componentHeightRange" min="20" max="800" value="300" class="w-16">
            <span id="componentHeightValue" class="text-xs">300px</span>
          </div>
          <button id="componentChangeBtn" class="bg-purple-600 text-white px-2 py-1 rounded text-sm"><i class="bi bi-arrow-repeat"></i> تعویض</button>
          <input type="file" id="componentChangeInput" accept="image/*" class="hidden">
          <div class="flex items-center gap-1">
            <i class="bi bi-brightness-high"></i>
            <input type="range" id="componentBrightness" min="0" max="200" value="100" class="w-16">
          </div>
          <div class="flex items-center gap-1">
            <i class="bi bi-contrast"></i>
            <input type="range" id="componentContrast" min="0" max="200" value="100" class="w-16">
          </div>
          <button id="componentCropBtn" class="bg-red-500 text-white px-2 py-1 rounded text-sm"><i class="bi bi-crop"></i> کراپ</button>
        </div>
      </div>

      <!-- چک‌باکس نمایش متن و دکمه ذخیره (حفظ شده) -->
      <div class="flex items-center justify-between mb-2">
        <label class="flex items-center gap-1">
          <input type="checkbox" id="modal-show-text" class="w-5 h-5">
          <span>نمایش متن سوال</span>
        </label>
        <button id="save-modal-btn" class="btn px-3 py-1">
          <i class="bi bi-floppy"></i> ذخیره
        </button>
      </div>

      <!-- جدول پیش‌نمایش (حفظ شده) -->
      <table class="w-full border-collapse bg-white" style="border: 1px solid #333;">
        <tr>
          <td id="modal-Qscore" style="border: 1px solid #333;" class="w-10 text-center font-bold"></td>
          <td class="p-2" id="modal-preview-cell"></td>
        </tr>
      </table>

      <!-- مودال کراپ برای ویرایشگر متن -->
      <div id="cropModal" class="crop-modal hidden">
        <div class="crop-panel">
          <h3><i class="bi bi-crop"></i> برش تصویر</h3>
          <div class="crop-container">
            <img id="cropImage" src="" alt="برای کراپ">
          </div>
          <div class="crop-actions">
            <button id="applyCrop">اعمال برش</button>
            <button id="cancelCrop">لغو</button>
          </div>
        </div>
      </div>

      <!-- مودال کراپ برای ویرایشگر تصویر -->
      <div id="componentCropModal" class="hidden crop-modal">
        <div class="bg-slate-800 rounded-3xl p-5 w-full max-w-md text-white">
          <h3 class="text-lg font-medium mb-4 flex items-center gap-2"><i class="bi bi-crop"></i> برش تصویر</h3>
          <div class="w-full max-h-64 overflow-hidden rounded-2xl bg-slate-900 mb-4">
            <img id="componentCropImage" src="" alt="برای کراپ" class="max-w-full">
          </div>
          <div class="flex gap-3">
            <button id="componentApplyCrop" class="flex-1 bg-blue-600 py-3 rounded-xl font-semibold">اعمال برش</button>
            <button id="componentCancelCrop" class="flex-1 bg-slate-600 py-3 rounded-xl font-semibold">لغو</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="toTop" title="برو بالا" class="
    fixed bottom-7 right-7 z-50
    w-14 h-14 rounded-full
    bg-[var(--primary)]
    text-white text-2xl
    flex items-center justify-center
    transition-all duration-300 ease-out
    opacity-0 invisible translate-y-6
    hover:-translate-y-1 hover:scale-110
    hover:shadow-xl
  ">
    <i class="bi bi-arrow-up"></i>
  </button>
  <script src="./utils/cropper/cropper.min.js"></script>
  <script src="./utils/persian-inputs.js"></script>
  <script src="./utils/alert.js"></script>
  <script src="./utils/confirm.js"></script>
  <script src="./app.js"></script>
</body>

</html>
