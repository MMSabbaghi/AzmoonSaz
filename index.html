<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ساخت کوییز</title>
  <link href="./utils/cropper/cropper.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./icons/bootstrap-icons.min.css">
  <script src="./utils/3.4.17"></script>
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100 md:p-6">

  <div class="max-w-6xl mx-auto bg-white p-3 md:p-6 rounded shadow app-container" id="app-container">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">کوئیز ساز</h1>
      <div>
        <button id="exportJson" class="btn px-4 py-2">
          <i class="bi bi-floppy"></i>
          ذخیره آزمون
        </button>
        <input type="file" id="importJson" class="hidden">
        <label for="importJson" class="btn px-4 py-2">
          <i class="bi bi-folder-plus"></i>
          <span> ورود اطلاعات</span>
        </label>
      </div>
    </div>

    <div id="ranges" class="flex flex-col gap-2"></div>

    <button id="addRange" style="width: 100%;" class="btn add-btn my-2">
      <i class="bi bi-plus-lg"></i>
      <span>افزودن مبحث جدید</span>
    </button>

    <div id="sentinel"></div>
    <div class="my-1 bg-white export-btns sticky-box" id="sticky">
      <div class="flex items-center justify-between gap-1">
        <!-- بخش سمت چپ (اسامی) که در موبایل پنهان می‌شود -->
        <div class="flex items-center gap-2 names-section-original">
          <div>
            <label> تعداد دانش آموزان: </label>
            <input value="1" data-number-input="true" data-float="false" type="text" id="names-count"
              class="border rounded p-2 w-20" placeholder="تعداد ">
          </div>
          <div class="flex items-center gap-2">
            <label for="fontSelector">فونت:</label>
            <select id="fontSelector" class="border rounded p-2 text-sm bg-white text-gray-800">
              <option value="'Vazirmatn', sans-serif" style="font-family: 'Vazirmatn', sans-serif;">وزیرمتن</option>
              <option value="'Shabnam', sans-serif" style="font-family: 'Shabnam', sans-serif;">شبنم</option>
              <option value="'BNazanin', sans-serif" style="font-family:'BNazanin', sans-serif;">نازنین</option>
            </select>
          </div>
          <div id="names-switch" class="flex gap-1">
            <label> نمایش اسامی: </label>
            <div id="switch" class="relative w-[42px] h-[24px] bg-[#ccc] rounded-[var(--radius)] cursor-pointer
                transition-all duration-300 ease-out shadow-inner">
              <div id="knob" class="absolute top-[2px] left-[3px] w-[20px] h-[20px] bg-white rounded-[var(--radius)]
                  transition-all duration-500 shadow-md">
              </div>
            </div>
          </div>
        </div>
        <div>
          <button id="generate" class="btn px-4 py-2 rounded mt-2 md:mb-2">
            <i class="bi bi-clipboard2-check"></i>
            <span>تولید آزمون</span>
          </button>
          <button onclick="window.print()" class="btn px-4 py-2 rounded md:mt-2 mb-2">
            <i class="bi bi-printer"></i>
            <span>چاپ خروجی</span>
          </button>
        </div>
      </div>
      <!-- تکست‌اریا اساسی (در موبایل پنهان می‌شود) -->
      <div id="names-textarea"
        class="overflow-hidden max-h-0 opacity-0 blur-sm -translate-y-3 transition-all duration-500 ease-out">
        <textarea rows="5" class="w-full h-15 border rounded-[var(--radius)] p-3 text-sm focus:outline-none"
          placeholder="نام دانش‌آموزان هر کدام در یک خط"></textarea>
      </div>
    </div>

    <!-- نوار پایین موبایل (جدید) -->
    <div id="mobile-bottom-bar">
      <div class="names-controls">
        <div>
          <input value="1" data-number-input="true" data-float="false" type="text" id="names-count-mobile"
            class="border rounded p-2 w-20" placeholder="تعداد">
        </div>
        <div id="names-switch-mobile" class="flex gap-1">
          <label> نمایش اسامی: </label>
          <div id="switch-mobile" class="relative w-[42px] h-[24px] bg-[#ccc] rounded-[var(--radius)] cursor-pointer
              transition-all duration-300 ease-out shadow-inner">
            <div id="knob-mobile" class="absolute top-[2px] left-[3px] w-[20px] h-[20px] bg-white rounded-[var(--radius)]
                transition-all duration-500 shadow-md">
            </div>
          </div>
        </div>
      </div>
      <div id="names-textarea-mobile" class="hidden">
        <textarea rows="3" class="w-full border rounded-[var(--radius)] p-3 text-sm focus:outline-none"
          placeholder="نام دانش‌آموزان هر کدام در یک خط"></textarea>
      </div>
    </div>

    <div id="printable" class="overflow-auto">
      <div class="flex items-center justify-center">
        <img src="images/no_data.jpg" alt="no_data" style="max-height: 380px;">
      </div>
    </div>
  </div>

  <!-- مودال ویرایش آیتم -->
  <div id="modal" class="modal" style="display: none;">
    <div id="modal-overlay" class="absolute inset-0 bg-black/60"></div>
    <div id="modalContent" class="flex flex-col z-10 w-[72rem] p-6 bg-white rounded-lg"
      style="transition: transform 0.3s ease-out;">
      <!-- نوار ابزار و تنظیمات -->
      <div>
        <!-- ویرایشگر متن -->
        <div class="mb-2">
          <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
            <div class="text-editor-toolbar">
              <button type="button" data-command="bold" title="پررنگ"><i class="bi bi-type-bold"></i></button>
              <button type="button" data-command="italic" title="ایتالیک"><i class="bi bi-type-italic"></i></button>
              <button type="button" data-command="underline" title="زیرخط"><i class="bi bi-type-underline"></i></button>
              <button type="button" data-command="justifyleft" title="چینش راست"><i
                  class="bi bi-align-start"></i></button>
              <button type="button" data-command="justifycenter" title="چینش وسط"><i
                  class="bi bi-align-middle"></i></button>
              <button type="button" data-command="justifyright" title="چینش چپ"><i class="bi bi-align-end"></i></button>
            </div>
            <div class="flex items-center gap-4">
              <label class="flex items-center gap-1">
                <input type="checkbox" id="modal-show-text" class="w-5 h-5">
                <span>نمایش متن سوال</span>
              </label>
              <button id="add-image-in-modal" class="btn px-3 py-1" title="افزودن/تغییر تصویر">
                <i class="bi bi-image"></i> تصویر
              </button>
              <div class="flex">
                <button id="save-modal-btn" class="btn px-3 py-1">
                  <i class="bi bi-floppy"></i>
                  ذخیره
                </button>
              </div>
              <input type="file" id="modal-image-upload" accept="image/*" class="hidden">
            </div>
          </div>
          <div id="modal-text-editor" class="text-editor-content" contenteditable="true"></div>
        </div>

        <!-- تنظیمات تصویر (فقط در صورت وجود تصویر نمایش داده می‌شود) -->
        <div id="image-settings" class="image-settings hidden">
          <div>
            <label>ارتفاع تصویر:</label>
            <input type="text" data-number-input="true" data-float="false" id="modal-imgHeight"
              class="border rounded p-2 w-20" value="75" min="10" max="500">
          </div>
          <div>
            <label>تراز تصویر:</label>
            <button class="align-btn btn px-3 py-1" data-align="RIGHT"><i class="bi bi-align-start"></i></button>
            <button class="align-btn btn px-3 py-1" data-align="CENTER"><i class="bi bi-align-middle"></i></button>
            <button class="align-btn btn px-3 py-1" data-align="LEFT"><i class="bi bi-align-end"></i></button>
          </div>
          <div class="mr-auto">
            <button id="editCropBtn" class="btn px-3 py-1"><i class="bi bi-crop"></i> برش</button>
            <button id="saveCroppedImageBtn" class="btn px-3 py-1 hidden"><i class="bi bi-check"></i> اعمال</button>
            <button id="cancelCropBtn" class="btn px-3 py-1 hidden"><i class="bi bi-x"></i> لغو</button>
          </div>
        </div>
      </div>

      <!-- پیش‌نمایش جدول -->
      <table class="w-full border-collapse bg-white mt-2" style="border: 1px solid #333;">
        <tr>
          <td id="modal-Qscore" style="border: 1px solid #333;" class="w-10 text-center font-bold"></td>
          <td class="p-2" id="modal-preview-cell">
            <!-- محتوای پیش‌نمایش به صورت داینامیک پر می‌شود -->
          </td>
        </tr>
      </table>
    </div>
  </div>

  <button id="toTop" title="برو بالا" class="
    fixed bottom-7 right-7 z-50
    w-14 h-14 rounded-full
    bg-[var(--primary)]
    text-white text-2xl
    flex items-center justify-center
    transition-all duration-300 ease-out
    opacity-0 invisible translate-y-6
    hover:-translate-y-1 hover:scale-110
    hover:shadow-xl
  ">
    <i class="bi bi-arrow-up"></i>
  </button>
  <script src="./utils/cropper/cropper.min.js"></script>
  <script src="./utils/persian-inputs.js"></script>
  <script src="./utils/alert.js"></script>
  <script src="./utils/confirm.js"></script>
  <script src="./app.js"></script>
</body>

</html>
