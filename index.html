<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ساخت کوییز</title>
  <link href="./utils/cropper/cropper.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./icons/bootstrap-icons.min.css">
  <script src="./utils/3.4.17"></script>
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100 md:p-6">

  <div class="max-w-6xl mx-auto bg-white p-3 md:p-6 rounded shadow app-container" id="app-container">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">کوئیز ساز</h1>
      <div>
        <button id="exportJson" class="btn px-4 py-2">
          <i class="bi bi-floppy"></i>
          ذخیره آزمون
        </button>
        <input type="file" id="importJson" class="hidden">
        <label for="importJson" class="btn px-4 py-2">
          <i class="bi bi-folder-plus"></i>
          <span> ورود اطلاعات</span>
        </label>
      </div>
    </div>

    <div id="ranges" class="flex flex-col gap-2"></div>

    <button id="addRange" style="width: 100%;" class="btn add-btn my-2">
      <i class="bi bi-plus-lg"></i>
      <span>افزودن مبحث جدید</span>
    </button>

    <div id="sentinel"></div>
    <div class="my-1 bg-white export-btns sticky-box" id="sticky">
      <div class="flex items-center justify-between gap-1">
        <!-- بخش سمت چپ (اسامی) که در موبایل پنهان می‌شود -->
        <div class="flex items-center gap-2 names-section-original">
          <div>
            <label> تعداد دانش آموزان: </label>
            <input value="1" data-number-input="true" data-float="false" type="text" id="names-count"
              class="border rounded p-2 w-20" placeholder="تعداد ">
          </div>
          <div class="flex items-center gap-2">
            <label for="fontSelector">فونت:</label>
            <select id="fontSelector" class="border rounded p-2 text-sm bg-white text-gray-800">
              <option value="'Vazirmatn', sans-serif" style="font-family: 'Vazirmatn', sans-serif;">وزیرمتن</option>
              <option value="'Shabnam', sans-serif" style="font-family: 'Shabnam', sans-serif;">شبنم</option>
              <option value="'BNazanin', sans-serif" style="font-family:'BNazanin', sans-serif;">نازنین</option>
            </select>
          </div>
          <div id="names-switch" class="flex gap-1">
            <label> نمایش اسامی: </label>
            <div id="switch" class="relative w-[42px] h-[24px] bg-[#ccc] rounded-[var(--radius)] cursor-pointer
                transition-all duration-300 ease-out shadow-inner">
              <div id="knob" class="absolute top-[2px] left-[3px] w-[20px] h-[20px] bg-white rounded-[var(--radius)]
                  transition-all duration-500 shadow-md">
              </div>
            </div>
          </div>
        </div>
        <div>
          <button id="generate" class="btn px-4 py-2 rounded mt-2 md:mb-2 desktop-cta">
            <i class="bi bi-clipboard2-check"></i>
            <span>تولید آزمون</span>
          </button>
          <button onclick="window.print()" class="btn px-4 py-2 rounded md:mt-2 mb-2 desktop-cta">
            <i class="bi bi-printer"></i>
            <span>چاپ خروجی</span>
          </button>
        </div>
      </div>
      <!-- تکست‌اریا اساسی -->
      <div id="names-textarea"
        class="overflow-hidden max-h-0 opacity-0 blur-sm -translate-y-3 transition-all duration-500 ease-out">
        <textarea rows="5" class="w-full h-15 border rounded-[var(--radius)] p-3 text-sm focus:outline-none"
          placeholder="نام دانش‌آموزان هر کدام در یک خط"></textarea>
      </div>
    </div>

    <!-- نوار پایین موبایل -->
    <div id="mobile-bottom-bar">
      <div class="names-controls"></div> <!-- place for cloned names section -->
      <div class="mobile-actions">
        <button class="btn mobile-generate"><i class="bi bi-clipboard2-check"></i> تولید آزمون</button>
        <button class="btn mobile-print"><i class="bi bi-printer"></i> چاپ</button>
      </div>
    </div>

    <div id="printable" class="overflow-auto">
      <div class="flex items-center justify-center">
        <img src="images/no_data.jpg" alt="no_data" style="max-height: 380px;">
      </div>
    </div>
  </div>

  <!-- ========== مودال ویرایش آیتم (بازطراحی شده) ========== -->
  <div id="modal" class="modal" style="display: none;">
    <div id="modal-overlay" class="absolute inset-0 bg-black/60 backdrop-blur"></div>
    <div id="modalContent" class="flex flex-col z-10 w-[72rem] p-6 bg-white rounded-lg"
      style="transition: transform 0.3s ease-out;">

      <!-- هدر مودال -->
      <div class="flex items-center justify-between mb-4 pb-2 border-b">
        <h2 class="text-xl font-bold">ویرایش سوال</h2>
        <button id="closeModalBtn" class="text-2xl leading-none hover:text-gray-600">&times;</button>
      </div>

      <!-- دکمه آپلود تصویر (در صورت نبود تصویر) -->
      <div id="modalImageUploadContainer" class="mb-2">
        <input type="file" id="modalImageUpload" accept="image/*" class="hidden">
        <label for="modalImageUpload" class="btn px-4 py-2 inline-flex items-center gap-2 cursor-pointer">
          <i class="bi bi-image"></i> افزودن تصویر
        </label>
      </div>

      <!-- ========== ویرایشگر متن پیشرفته (Rich Text) ========== -->
      <div class="rich-editor-wrapper relative w-full bg-white border border-gray-300 overflow-hidden mb-4" dir="rtl">
        <!-- تولبار موبایل -->
        <div
          class="rich-editor-toolbar-mobile block md:hidden bg-gray-100 border-b border-gray-300 p-2 overflow-x-auto whitespace-nowrap"
          id="mobile-toolbar-modal">
          <div class="toolbar-scroll inline-flex items-center gap-1">
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="bold" title="پررنگ"><i class="bi bi-type-bold"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="italic" title="ایتالیک"><i class="bi bi-type-italic"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="underline" title="زیرخط"><i class="bi bi-type-underline"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="strikeThrough" title="خط خورده"><i class="bi bi-type-strikethrough"></i></button>

            <span class="toolbar-divider w-px h-6 bg-gray-400 mx-1 inline-block"></span>

            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyRight" title="راست چین"><i class="bi bi-align-start"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyCenter" title="وسط چین"><i class="bi bi-align-middle"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyLeft" title="چپ چین"><i class="bi bi-align-end"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyFull" title="هم‌تراز"><i class="bi bi-justify"></i></button>

            <span class="toolbar-divider w-px h-6 bg-gray-400 mx-1 inline-block"></span>

            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="insertUnorderedList" title="لیست نامرتب"><i class="bi bi-list-ul"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="insertOrderedList" title="لیست مرتب"><i class="bi bi-list-ol"></i></button>

            <span class="toolbar-divider w-px h-6 bg-gray-400 mx-1 inline-block"></span>

            <div class="toolbar-color-picker relative inline-flex items-center">
              <input type="color" id="modal-text-color" class="color-input absolute opacity-0 w-0 h-0" value="#333333">
              <label for="modal-text-color"
                class="color-label inline-flex items-center gap-1 px-2 h-9 rounded bg-transparent text-gray-600 cursor-pointer hover:bg-gray-200 hover:text-gray-800 text-sm"><i
                  class="bi bi-palette"></i></label>
            </div>

            <div class="toolbar-font-size inline-block">
              <select id="modal-font-size"
                class="font-size-select h-9 px-2 border border-gray-300 rounded bg-white text-gray-600 text-sm cursor-pointer outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-300"
                title="اندازه فونت">
                <option value="12">۱۲</option>
                <option value="14">۱۴</option>
                <option value="16" selected>۱۶</option>
                <option value="18">۱۸</option>
                <option value="20">۲۰</option>
                <option value="24">۲۴</option>
                <option value="28">۲۸</option>
                <option value="32">۳۲</option>
              </select>
            </div>

            <span class="toolbar-divider w-px h-6 bg-gray-400 mx-1 inline-block"></span>

            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-action="undo" title="بازگشت"><i class="bi bi-arrow-counterclockwise"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-action="redo" title="انجام دوباره"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
        </div>

        <!-- تولبار دسکتاپ -->
        <div
          class="rich-editor-toolbar-desktop hidden md:flex flex-wrap items-center gap-3 bg-gray-100 p-2 px-3 border-b border-gray-300"
          id="desktop-toolbar-modal">
          <div class="toolbar-group flex items-center gap-0.5 px-1 border-l border-gray-300 last:border-l-0">
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="bold"><i class="bi bi-type-bold"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="italic"><i class="bi bi-type-italic"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="underline"><i class="bi bi-type-underline"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="strikeThrough"><i class="bi bi-type-strikethrough"></i></button>
          </div>
          <div class="toolbar-group flex items-center gap-0.5 px-1 border-l border-gray-300 last:border-l-0">
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyRight"><i class="bi bi-align-start"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyCenter"><i class="bi bi-align-middle"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyLeft"><i class="bi bi-align-end"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="justifyFull"><i class="bi bi-justify"></i></button>
          </div>
          <div class="toolbar-group flex items-center gap-0.5 px-1 border-l border-gray-300 last:border-l-0">
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="insertUnorderedList"><i class="bi bi-list-ul"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-command="insertOrderedList"><i class="bi bi-list-ol"></i></button>
          </div>
          <div class="toolbar-group flex items-center gap-0.5 px-1 border-l border-gray-300 last:border-l-0">
            <div class="toolbar-color-picker relative inline-flex items-center">
              <input type="color" id="desktop-modal-text-color" class="color-input absolute opacity-0 w-0 h-0"
                value="#333333">
              <label for="desktop-modal-text-color"
                class="color-label inline-flex items-center gap-1 px-2 h-9 rounded bg-transparent text-gray-600 cursor-pointer hover:bg-gray-200 hover:text-gray-800 text-sm"><i
                  class="bi bi-palette"></i> رنگ</label>
            </div>
            <select id="desktop-modal-font-size"
              class="font-size-select h-9 px-2 border border-gray-300 rounded bg-white text-gray-600 text-sm cursor-pointer outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-300">
              <option value="12">۱۲</option>
              <option value="14">۱۴</option>
              <option value="16" selected>۱۶</option>
              <option value="18">۱۸</option>
              <option value="20">۲۰</option>
              <option value="24">۲۴</option>
              <option value="28">۲۸</option>
              <option value="32">۳۲</option>
            </select>
          </div>
          <div class="toolbar-group flex items-center gap-0.5 px-1 last:border-l-0">
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-action="undo"><i class="bi bi-arrow-counterclockwise"></i></button>
            <button type="button"
              class="toolbar-btn min-w-[36px] h-9 px-2 border-none bg-transparent rounded text-gray-600 text-base cursor-pointer inline-flex items-center justify-center transition-all duration-200 hover:bg-gray-200 hover:text-gray-800 active:scale-95"
              data-action="redo"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
        </div>

        <!-- باکس ویرایش متن -->
        <div
          class="rich-editor-content relative min-h-[150px] max-h-[300px] overflow-y-auto p-4 leading-relaxed outline-none bg-white focus:shadow-inner"
          id="modal-text-editor" contenteditable="true" data-placeholder="متن خود را بنویسید..."></div>
      </div>

      <!-- نوار ابزار تنظیمات تصویر (فقط زمانی نمایش داده می‌شود که تصویر وجود دارد) -->
      <div id="previewImageToolbar" class="hidden bg-gray-100 p-3 flex flex-wrap items-center gap-4 mb-4">
        <div class="flex items-center gap-2">
          <label class="text-sm">ارتفاع:</label>
          <input type="range" id="previewImgHeight" min="20" max="800" value="300" class="w-24">
          <span id="previewImgHeightValue" class="text-xs w-12">300px</span>
        </div>

        <div class="flex items-center gap-1">
          <button class="btn px-3 py-1 rounded text-sm" data-align="right"><i class="bi bi-align-start"></i></button>
          <button class="btn px-3 py-1  rounded text-sm" data-align="center"><i class="bi bi-align-middle"></i></button>
          <button class="btn px-3 py-1 rounded text-sm" data-align="left"><i class="bi bi-align-end"></i></button>
        </div>
        <button id="previewCropBtn" class="btn px-3 py-1 text-sm"><i class="bi bi-crop"></i>
        </button>

        <div class="flex items-center gap-2">
          <label class="text-sm">روشنایی:</label>
          <input type="range" id="previewImgBrightness" min="0" max="200" value="100" class="w-24">
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm">کنتراست:</label>
          <input type="range" id="previewImgContrast" min="0" max="200" value="100" class="w-24">
        </div>
        <button id="removeImageBtn" class="btn px-3 py-1 rounded text-sm"><i class="bi bi-trash"></i>
        </button>
      </div>

      <!-- ========== جدول پیش‌نمایش ========== -->
      <div class="mb-4 relative">
        <table class="w-full border-collapse bg-white" style="border: 1px solid #333;">
          <tr>
            <td id="modal-Qscore" style="border: 1px solid #333;" class="w-10 text-center font-bold"></td>
            <td class="p-2 relative" id="modal-preview-cell">
              <!-- محتوای پیش‌نمایش (متن و تصویر) در اینجا درج می‌شود -->
            </td>
          </tr>
        </table>
      </div>

      <!-- چک‌باکس نمایش متن و دکمه ذخیره -->
      <div class="flex items-center justify-between mb-2">
        <label class="flex items-center gap-1">
          <input type="checkbox" id="modal-show-text" class="w-5 h-5">
          <span>نمایش متن سوال</span>
        </label>
        <button id="save-modal-btn" class="btn px-3 py-1">
          <i class="bi bi-floppy"></i> ذخیره
        </button>
      </div>

      <!-- مودال برش تصویر (یکپارچه) -->
      <div id="cropModal" class="crop-modal hidden">
        <div class="crop-panel">
          <h3 class="text-lg font-medium mb-4 flex items-center gap-2"><i class="bi bi-crop"></i> برش تصویر</h3>
          <div class="crop-container">
            <img id="cropImage" src="" alt="برای کراپ">
          </div>
          <div class="crop-actions">
            <button id="applyCrop" class="btn flex-1 py-3">اعمال
              برش</button>
            <button id="cancelCrop" class="btn flex-1 py-3">لغو</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="toTop" title="برو بالا" class="
    fixed bottom-7 right-7 z-50
    w-14 h-14 rounded-full
    bg-[var(--primary)]
    text-white text-2xl
    flex items-center justify-center
    transition-all duration-300 ease-out
    opacity-0 invisible translate-y-6
    hover:-translate-y-1 hover:scale-110
    hover:shadow-xl
  ">
    <i class="bi bi-arrow-up"></i>
  </button>
  <script src="./utils/cropper/cropper.min.js"></script>
  <script src="./utils/persian-inputs.js"></script>
  <script src="./utils/alert.js"></script>
  <script src="./utils/confirm.js"></script>
  <script src="./app.js"></script>
</body>

</html>
