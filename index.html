<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>ساخت کوییز</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

  <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow app-container" id="app-container">
    <div class="flex items-center justify-between mb-2">
      <h1 class="text-2xl font-bold">کوئیز ساز</h1>
      <div>
        <button id="exportJson" class="btn px-4 py-2">
          <i class="bi bi-floppy"></i>
          ذخیره آزمون</button>
        <input type="file" id="importJson" class="hidden">
        <button id="importJsonBtn" class="btn px-4 py-2"><i class="bi bi-folder-plus"></i>
          <span>
            ورود اطلاعات
          </span>
        </button>
      </div>
    </div>

    <div id="ranges"></div>
    <button id="addRange" style="width: 100%;" class="btn add-btn my-2">
      <i class="bi bi-plus-lg"></i>
      <span>
        افزودن
        مبحث جدید
      </span>
    </button>

    <div id="sentinel"></div>
    <div class="flex items-center justify-between gap-1 my-1 bg-white export-btns sticky-box" id="sticky">

      <div>
        <label> تعداد دانش آموزان: </label>
        <input data-number-input="true" data-float="false" type="text" id="names" class="border rounded p-2"
          placeholder="تعداد ">
      </div>

      <div>
        <button id="generate" class="btn px-4 py-2 rounded mt-2 mb-2">
          <i class="bi bi-clipboard2-check"></i>
          <span>
            تولید آزمون
          </span>
        </button>

        <button onclick="window.print()" class="btn px-4 py-2 rounded mt-2 mb-2">
          <i class="bi bi-printer"></i>
          <span>
            چاپ خروجی
          </span>
        </button>
      </div>

    </div>
    <div id="printable" class="overflow-auto">
      <div class="flex items-center justify-center">
        <img src="images/no_data.jpg" alt="no_data" style="max-height: 380px;">
      </div>
    </div>
  </div>

  <!-- Modal برای نمایش بزرگ تصویر -->
  <div id="modal" class="modal flex" style="display: none;">
    <img id="modal-img" src="">
  </div>

  <button id="toTop" title="برو بالا" class="
    fixed bottom-7 right-7 z-50
    w-14 h-14 rounded-full
    bg-[var(--primary)]
    text-white text-2xl
    flex items-center justify-center
    transition-all duration-300 ease-out
    opacity-0 invisible translate-y-6
    hover:-translate-y-1 hover:scale-110
    hover:shadow-xl
  ">
    <i class="bi bi-arrow-up"></i>
  </button>
  <script src="./utils/persian-inputs.js"></script>
  <script src="./utils/alert.js"></script>
  <script src="app.js"></script>

</body>

</html>
